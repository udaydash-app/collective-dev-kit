name: Build and Release Cross-Platform Apps

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install PostgreSQL client (pg_dump)
        shell: pwsh
        run: |
          choco install postgresql17 --no-progress --params '/Password:ci' -y
          echo "C:\Program Files\PostgreSQL\17\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Pre-seed local PGlite database snapshot
        if: env.DATABASE_URL != ''
        run: node scripts/build-local-db.mjs

      - name: Build app
        run: npm run build

      - name: Build & publish Electron app to GitHub Release
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            release/*.exe
            release/latest.yml

  build-mac:
    name: Build macOS
    runs-on: macos-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install PostgreSQL client (pg_dump)
        run: brew install libpq && echo "$(brew --prefix libpq)/bin" >> $GITHUB_PATH

      - name: Pre-seed local PGlite database snapshot
        if: env.DATABASE_URL != ''
        run: node scripts/build-local-db.mjs

      - name: Build app
        run: npm run build

      - name: Build & publish Electron app to GitHub Release
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-installers
          path: |
            release/*.dmg
            release/*.zip
            release/*.dmg.blockmap
            release/*.zip.blockmap
            release/latest-mac.yml

  release:
    name: Create GitHub Release
    needs: [build-windows, build-mac]
    if: always() && needs.build-windows.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: release-windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: mac-installers
          path: release-mac

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: false
          prerelease: false
          files: |
            release-windows/*.exe
            release-windows/latest.yml
            release-mac/*.dmg
            release-mac/*.zip
            release-mac/*.blockmap
            release-mac/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
